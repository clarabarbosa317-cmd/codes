<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitGym - Ver Seleção</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

<body>
    <header>
        <a href="adaptar_treino.html" class="voltar">&lt;</a>
        <h1>Ver seleção</h1>
    </header>

    <main>
        <ul class="lista-selecao">
            <li class="item-selecao-check">
                <input type="checkbox" id="costas" checked>
                <label for="costas">Costas</label>
            </li>
            <li class="item-selecao-check">
                <input type="checkbox" id="peito" checked>
                <label for="peito">Peito</label>
            </li>
            <li class="item-selecao-check">
                <input type="checkbox" id="perna" checked>
                <label for="perna">Perna</label>
            </li>
            <li class="item-selecao-check">
                <input type="checkbox" id="ombro" checked>
                <label for="ombro">Ombro</label>
            </li>
            <li class="item-selecao-check">
                <input type="checkbox" id="bracos" checked>
                <label for="bracos">Braços</label>
            </li>
        </ul>
    </main>

    <footer class="rodape-app">
        <nav class="menu-inferior">
            <a href="index.html"><img src="img/home-icon.svg" alt="Início"></a>
            <a href="perfil.html"><img src="img/perfil-icon.png" alt="Meu Perfil"></a>
        </nav>
    </footer>

</html>
